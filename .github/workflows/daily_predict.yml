name: Daily Electricity Price Prediction

on:
  schedule:
    # 14:00 UTC = 15:00/16:00 CET — Nordpool publishes day-ahead prices around 13:00 CET
    - cron: '0 14 * * *'
  # Allows manual trigger from the GitHub Actions tab for testing
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run prediction
        env:
          ENTSO_E_TOKEN: ${{ secrets.ENTSO_E_TOKEN }}
          HA_URL: ${{ secrets.HA_URL }}
          HA_TOKEN: ${{ secrets.HA_TOKEN }}
        run: python predict.py
